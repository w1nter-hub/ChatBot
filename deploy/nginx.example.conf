# Пример для Certbot: замените example.com, пути к сертификатам подставит certbot.
# Прокси ведут на порты docker compose: 3030 — дашборд, 3031 — виджет.

upstream qoldauai_dashboard {
    server 127.0.0.1:3030;
}

upstream qoldauai_widget {
    server 127.0.0.1:3031;
}

server {
    listen 80;
    server_name app.example.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name app.example.com;

    # ssl_certificate /etc/letsencrypt/live/app.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://qoldauai_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name widget.example.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name widget.example.com;

    # ssl_certificate /etc/letsencrypt/live/widget.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/widget.example.com/privkey.pem;

    location / {
        proxy_pass http://qoldauai_widget;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
