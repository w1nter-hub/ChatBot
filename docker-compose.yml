version: '3'

services:
  redis:
    image: redis:alpine
    expose:
      - "6379"

  mongodb:
    image: mongo:latest
    volumes:
      - db-data:/data/db
    expose:
      - "27017"

  qoldauai-api:
    build: .
    command: node dist/main.js
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - mongodb

  qoldauai-node-worker:
    build: .
    command: node dist/crawler.main.js
    depends_on:
      - redis
      - mongodb

  qoldauai-python-worker:
    build: ./workers
    depends_on:
      - redis
      - mongodb

  qoldauai-dashboard:
    build: ./frontend
    ports:
      - "3030:80"
    depends_on:
      - qoldauai-api

  qoldauai-widget:
    build: ./widget
    ports:
      - "3031:80"
    depends_on:
      - qoldauai-api

volumes:
  db-data: